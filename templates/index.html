<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 文档问答系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-light: #eef2ff;
            --bg-main: #ffffff;
            --bg-sidebar: #f8fafc;
            --bg-hover: #f1f5f9;
            --border: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-main);
            height: 100vh;
            display: flex;
            color: var(--text-primary);
        }

        /* 左侧边栏 */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            transition: width 0.3s ease;
            overflow: hidden;
        }

        .sidebar.collapsed {
            width: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-weight: 700;
            font-size: 18px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        .new-chat-btn {
            margin: 16px;
            padding: 14px 16px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-sm);
        }

        .new-chat-btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .menu-items {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .menu-item {
            padding: 12px 14px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            white-space: nowrap;
            color: var(--text-secondary);
        }

        .menu-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .menu-item.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        .menu-item.active {
            background: #e5e5e5;
        }

        /* 折叠按钮 */
        .toggle-btn {
            position: fixed;
            left: 12px;
            top: 12px;
            z-index: 100;
            width: 36px;
            height: 36px;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: var(--shadow-sm);
        }

        .toggle-btn:hover {
            background: var(--bg-hover);
            box-shadow: var(--shadow-md);
        }

        /* 主聊天区域 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-main);
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            background: white;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #fafafa;
        }

        .message {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .message-content {
            flex: 1;
        }

        .message .role {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .message.user .message-role {
            text-align: right;
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: var(--radius-lg);
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            box-shadow: var(--shadow-sm);
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            border-top-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: white;
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }

        .sources {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .source-item {
            padding: 12px 16px;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        .source-item:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }

        .source-file {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .source-content {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
        }

        .source-score {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .message .sources {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #888;
        }

        .chat-input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            background: white;
        }

        .chat-input-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .chat-input {
            width: 100%;
            padding: 14px 18px;
            padding-right: 60px;
            border: 2px solid var(--border);
            border-radius: var(--radius-lg);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            min-height: 52px;
            max-height: 200px;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        .send-btn {
            position: absolute;
            right: 10px;
            bottom: 10px;
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-md);
        }

        .send-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 知识库页面 */
        .knowledge-base {
            padding: 32px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .kb-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .kb-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .upload-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .tenant-input {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 14px;
            width: 220px;
            margin-bottom: 20px;
            transition: all 0.2s;
        }

        .tenant-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .doc-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .doc-item {
            padding: 16px 20px;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .doc-item:hover {
            background: #f9fafb;
            border-color: var(--primary);
        }

        .doc-checkbox {
            margin-right: 12px;
        }

        .doc-checkbox input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
            justify-content: space-between;
            align-items: center;
        }

        .doc-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .doc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .doc-icon {
            font-size: 36px;
        }

        .doc-name {
            font-weight: 500;
            font-size: 14px;
            color: #1f2937;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 8px;
        }

        .doc-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .doc-date {
            font-size: 12px;
            color: #9ca3af;
        }

        .doc-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid #f3f4f6;
        }

        .action-btn {
            padding: 6px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            background: #f3f4f6;
            color: #6b7280;
        }

        .action-btn:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        .doc-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .doc-status.completed {
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
            color: #16a34a;
        }

        .doc-status.failed {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #dc2626;
        }

        .doc-status.processing {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            color: #2563eb;
        }

        .doc-status.pending {
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
            color: #6b7280;
        }

        .delete-btn {
            padding: 8px 14px;
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #dc2626;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: linear-gradient(135deg, #fecaca, #fca5a5);
            transform: translateY(-1px);
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 28px;
            border-radius: var(--radius-lg);
            width: 440px;
            max-width: 90%;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .modal-input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .modal-btn {
            padding: 12px 24px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .modal-btn.cancel {
            background: var(--bg-hover);
            border: none;
            color: var(--text-secondary);
        }

        .modal-btn.cancel:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            border: none;
        }

        .modal-btn.confirm:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        /* 单选下拉框 */
        .single-select-container {
            position: relative;
            min-width: 200px;
        }

        .single-select-trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            background: white;
            cursor: pointer;
            font-size: 14px;
            min-height: 40px;
            transition: all 0.2s;
        }

        .single-select-trigger:hover {
            border-color: var(--primary);
        }

        .single-select-trigger .selected-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            font-weight: 500;
            color: var(--text-primary);
        }

        .single-select-trigger .arrow {
            margin-left: 8px;
            transition: transform 0.2s;
            color: var(--text-muted);
        }

        .single-select-trigger.open .arrow {
            transform: rotate(180deg);
        }

        .single-select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 6px;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            max-height: 240px;
            overflow-y: auto;
            z-index: 100;
            z-index: 1000;
            display: none;
        }

        .single-select-dropdown.show {
            display: block;
        }

        .single-select-option {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
        }

        .single-select-option:hover {
            background: #f5f5f5;
        }

        .single-select-option .tenant-name {
            flex: 1;
        }

        .single-select-option .tenant-id {
            color: #888;
            font-size: 11px;
        }

        .hidden {
            display: none !important;
        }

        .history-section {
            padding: 12px;
            border-top: 1px solid #e5e5e5;
            margin-top: auto;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            padding: 0 8px;
        }

        .history-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: #e5e5e5;
        }

        .history-item.active {
            background: #e5e5e5;
        }
    </style>
</head>

<body>
    <button class="toggle-btn" onclick="toggleSidebar()">☰</button>

    <!-- 左侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">AI 助手</span>
        </div>

        <button class="new-chat-btn" onclick="newChat()">
            <span>💬</span> 新建对话
        </button>

        <div class="menu-items">
            <div class="menu-item active" onclick="showChat()" id="chat-menu">
                <span>💬</span> 对话
            </div>
            <div class="menu-item" onclick="showKnowledgeBase()" id="kb-menu">
                <span>📚</span> 知识库
            </div>
            <div class="menu-item" onclick="showTenantManagement()" id="tenant-menu">
                <span>🏢</span> 租户管理
            </div>
        </div>

        <!-- 历史记录 -->
        <div class="history-section" id="history-section">
            <div class="history-title">历史记录</div>
            <div id="history-list">
                <div style="font-size:12px;color:#888;padding:8px;">暂无记录</div>
            </div>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main">
        <!-- 对话页面 -->
        <div id="chat-page">
            <div class="chat-header">
                <span>AI 助手</span>
                <div class="single-select-container" id="chat-tenant-container">
                    <div class="single-select-trigger" onclick="toggleChatTenantSelect()">
                        <span class="selected-text" id="chat-tenant-text">选择租户</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="single-select-dropdown" id="chat-tenant-dropdown">
                        <!-- Options loaded dynamically -->
                    </div>
                </div>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="message assistant">
                    <div class="message-avatar">AI</div>
                    <div class="message-content">
                        <div class="message-role">AI 助手</div>
                        <div class="message-bubble">
                            你好！我是 AI 助手。我可以回答你关于知识库中文档的问题。请先在知识库中上传文档，然后问我问题。
                        </div>
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="chat-input-container">
                    <input type="text" class="chat-input" id="question-input" placeholder="发送消息..."
                        onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()" id="send-btn">➤</button>
                </div>
            </div>
        </div>

        <!-- 知识库页面 -->
        <div id="kb-page" class="hidden">
            <div class="knowledge-base">
                <div class="kb-header">
                    <h1 class="kb-title">知识库</h1>
                </div>

                <!-- 搜索筛选栏（一行） -->
                <div class="doc-filter-bar" style="display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;">
                    <!-- 租户选择 -->
                    <div class="single-select-container" id="kb-tenant-container" style="min-width: 150px;">
                        <div class="single-select-trigger" onclick="toggleKbTenantSelect()">
                            <span class="selected-text" id="kb-tenant-text">选择租户</span>
                            <span class="arrow">▼</span>
                        </div>
                        <div class="single-select-dropdown" id="kb-tenant-dropdown">
                            <!-- Options loaded dynamically -->
                        </div>
                    </div>

                    <!-- 文件名搜索 -->
                    <input type="text"
                           id="doc-search-input"
                           placeholder="搜索文件名..."
                           style="flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 14px;"
                           onkeyup="if(event.key==='Enter') filterDocuments()">

                    <!-- 状态筛选 -->
                    <select id="doc-status-filter"
                            style="padding: 8px 12px; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 14px; min-width: 100px;"
                            onchange="filterDocuments()">
                        <option value="">全部状态</option>
                        <option value="COMPLETED">已完成</option>
                        <option value="PROCESSING">处理中</option>
                        <option value="PENDING">等待中</option>
                        <option value="FAILED">失败</option>
                    </select>

                    <!-- 搜索按钮 -->
                    <button onclick="filterDocuments()"
                            style="padding: 8px 16px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;">
                        搜索
                    </button>

                    <!-- 上传文档按钮 -->
                    <button class="upload-btn" onclick="showUploadModal()" style="margin-left: auto;">上传文档</button>
                </div>

                <div class="doc-list" id="doc-list">
                    <div style="text-align: center; color: #888; padding: 40px;">
                        暂无文档，请上传
                    </div>
                </div>

                <!-- 分页控件 -->
                <div class="pagination" id="doc-pagination"
                    style="display: none; justify-content: center; align-items: center; gap: 8px; padding: 16px;">
                    <button onclick="changePage(-1)" id="prev-page-btn"
                        style="padding: 6px 12px; border: 1px solid #e5e5e5; background: white; border-radius: 4px; cursor: pointer;">上一页</button>
                    <span id="page-info" style="font-size: 13px; color: #666;">1 / 1</span>
                    <button onclick="changePage(1)" id="next-page-btn"
                        style="padding: 6px 12px; border: 1px solid #e5e5e5; background: white; border-radius: 4px; cursor: pointer;">下一页</button>
                </div>
            </div>
        </div>

        <!-- 租户管理页面 -->
        <div id="tenant-page" class="hidden">
            <div class="knowledge-base">
                <div class="kb-header">
                    <h1 class="kb-title">租户管理</h1>
                    <button class="upload-btn" onclick="showAddTenantModal()">新增租户</button>
                </div>

                <div class="doc-list" id="tenant-list">
                    <div style="text-align: center; color: #888; padding: 40px;">
                        加载中...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 上传弹窗 -->
    <div class="modal" id="upload-modal">
        <div class="modal-content">
            <div class="modal-title">上传文档</div>
            <select class="modal-input" id="upload-tenant-id">
                <option value="">选择租户</option>
            </select>
            <input type="file" class="modal-input" id="upload-file" accept=".txt,.pdf,.doc,.docx,.jpg,.jpeg,.png,.gif,.bmp,.webp" multiple>
            <div style="font-size: 12px; color: #888; margin-top: 4px;">支持 PDF、DOCX、TXT、图片等格式（按住 Ctrl/Command 选择多个）</div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="hideUploadModal()">取消</button>
                <button class="modal-btn confirm" onclick="uploadDocument()">上传</button>
            </div>
        </div>
    </div>

    <!-- 添加租户弹窗 -->
    <div class="modal" id="add-tenant-modal">
        <div class="modal-content">
            <div class="modal-title">新增租户</div>
            <input type="text" class="modal-input" id="tenant-name" placeholder="租户名称">
            <input type="text" class="modal-input" id="tenant-id" placeholder="租户ID（如: tenant_001）">
            <textarea class="modal-input" id="tenant-description" placeholder="描述（可选）" rows="3"></textarea>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="hideAddTenantModal()">取消</button>
                <button class="modal-btn confirm" onclick="addTenant()">添加</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentSessionId = null; // 当前会话ID

        // Tab 切换
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        function showChat() {
            document.getElementById('chat-page').classList.remove('hidden');
            document.getElementById('kb-page').classList.add('hidden');
            document.getElementById('tenant-page').classList.add('hidden');
            document.getElementById('history-section').classList.remove('hidden');
            document.getElementById('chat-menu').classList.add('active');
            document.getElementById('kb-menu').classList.remove('active');
            loadChatTenantSelect();
            // loadHistory 会在 loadChatTenantSelect 内部调用
        }

        // 当前选中的租户
        let selectedTenant = null;
        let currentDocPage = 1;
        let docTotal = 0;
        let docPageSize = 10;

        async function loadChatTenantSelect() {
            try {
                const response = await fetch(`${API_BASE}/tenants/`);
                const tenants = await response.json();

                const dropdown = document.getElementById('chat-tenant-dropdown');
                dropdown.innerHTML = tenants.map(tenant => `
                    <div class="single-select-option" onclick="selectChatTenant('${tenant.tenant_id}', '${tenant.name}')">
                        <span class="tenant-name">${tenant.name}</span>
                        <span class="tenant-id">${tenant.tenant_id}</span>
                    </div>
                `).join('');

                // Default select first tenant if none selected
                if (!selectedTenant && tenants.length > 0) {
                    selectedTenant = { id: tenants[0].tenant_id, name: tenants[0].name };
                    updateChatTenantDisplay();
                } else if (tenants.length === 0) {
                    // 没有租户时也加载历史（会显示空）
                    loadHistory();
                }
            } catch (error) {
                console.error('Failed to load tenants:', error);
            }
        }

        function toggleChatTenantSelect() {
            const trigger = document.querySelector('#chat-tenant-container .single-select-trigger');
            const dropdown = document.getElementById('chat-tenant-dropdown');
            trigger.classList.toggle('open');
            dropdown.classList.toggle('show');
        }

        function selectChatTenant(tenantId, tenantName) {
            selectedTenant = { id: tenantId, name: tenantName };
            updateChatTenantDisplay();
            // Close dropdown
            const trigger = document.querySelector('#chat-tenant-container .single-select-trigger');
            const dropdown = document.getElementById('chat-tenant-dropdown');
            trigger.classList.remove('open');
            dropdown.classList.remove('show');
        }

        function updateChatTenantDisplay() {
            const trigger = document.querySelector('#chat-tenant-container .single-select-trigger .selected-text');
            if (!selectedTenant) {
                trigger.textContent = '选择租户';
            } else {
                trigger.textContent = selectedTenant.name;
            }
            loadHistory();
        }

        function newChat() {
            // 重置当前session
            currentSessionId = null;

            // 清空聊天记录
            document.getElementById('chat-messages').innerHTML = `
                <div class="message assistant">
                    <div class="message-avatar">AI</div>
                    <div class="message-content">
                        <div class="message-role">AI 助手</div>
                        <div class="message-bubble">
                            你好！我是 AI 助手。我可以回答你关于知识库中文档的问题。请先在知识库中上传文档，然后问我问题。
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('question-input').value = '';
            showChat();
            loadHistory();
        }

        function showKnowledgeBase() {
            document.getElementById('chat-page').classList.add('hidden');
            document.getElementById('kb-page').classList.remove('hidden');
            document.getElementById('tenant-page').classList.add('hidden');
            document.getElementById('history-section').classList.remove('hidden');
            document.getElementById('chat-menu').classList.remove('active');
            document.getElementById('kb-menu').classList.add('active');
            loadTenantSelect();
        }

        async function loadTenantSelect() {
            try {
                const response = await fetch(`${API_BASE}/tenants/`);
                const tenants = await response.json();

                const dropdown = document.getElementById('kb-tenant-dropdown');
                dropdown.innerHTML = tenants.map(tenant => `
                    <div class="single-select-option" onclick="selectKbTenant('${tenant.tenant_id}', '${tenant.name}')">
                        <span class="tenant-name">${tenant.name}</span>
                        <span class="tenant-id">${tenant.tenant_id}</span>
                    </div>
                `).join('');

                // Default select first tenant if none selected
                if (tenants.length > 0 && !window.selectedTenantKb) {
                    window.selectedTenantKb = { id: tenants[0].tenant_id, name: tenants[0].name };
                    updateKbTenantDisplay();
                    // Load documents after selecting default tenant
                    loadDocuments();
                } else if (window.selectedTenantKb) {
                    // If tenant already selected, just load documents
                    loadDocuments();
                }
            } catch (error) {
                console.error('Failed to load tenants:', error);
            }
        }

        function toggleKbTenantSelect() {
            const trigger = document.querySelector('#kb-tenant-container .single-select-trigger');
            const dropdown = document.getElementById('kb-tenant-dropdown');
            trigger.classList.toggle('open');
            dropdown.classList.toggle('show');
        }

        function selectKbTenant(tenantId, tenantName) {
            window.selectedTenantKb = { id: tenantId, name: tenantName };
            updateKbTenantDisplay();
            // Close dropdown
            const trigger = document.querySelector('#kb-tenant-container .single-select-trigger');
            const dropdown = document.getElementById('kb-tenant-dropdown');
            trigger.classList.remove('open');
            dropdown.classList.remove('show');
            // Reset to first page
            currentDocPage = 1;
            loadDocuments();
        }

        function updateKbTenantDisplay() {
            const trigger = document.querySelector('#kb-tenant-container .single-select-trigger .selected-text');
            if (!window.selectedTenantKb) {
                trigger.textContent = '选择租户';
            } else {
                trigger.textContent = window.selectedTenantKb.name;
            }
        }

        // 点击外部关闭下拉框
        document.addEventListener('click', function (e) {
            const chatContainer = document.getElementById('chat-tenant-container');
            const kbContainer = document.getElementById('kb-tenant-container');

            if (chatContainer && !chatContainer.contains(e.target)) {
                chatContainer.querySelector('.single-select-trigger').classList.remove('open');
                document.getElementById('chat-tenant-dropdown').classList.remove('show');
            }
            if (kbContainer && !kbContainer.contains(e.target)) {
                kbContainer.querySelector('.single-select-trigger').classList.remove('open');
                document.getElementById('kb-tenant-dropdown').classList.remove('show');
            }
        });

        // 加载历史记录
        async function loadHistory() {
            // Get tenant from selectedTenant
            const tenantId = selectedTenant ? selectedTenant.id : 'test_tenant';
            const listDiv = document.getElementById('history-list');

            try {
                const response = await fetch(`${API_BASE}/chat/?tenant_id=${tenantId}`);
                const data = await response.json();

                // API returns array directly
                const sessions = Array.isArray(data) ? data : [];

                if (sessions.length > 0) {
                    // 只显示前10条记录
                    const recentSessions = sessions.slice(0, 10);
                    listDiv.innerHTML = recentSessions.map(session => {
                        const title = session.title || '新对话';
                        const time = new Date(session.created_at).toLocaleString('zh-CN', {
                            month: 'numeric',
                            day: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        });
                        return `
                            <div class="history-item" onclick="loadChatSession('${session.id}')" title="${title}">
                                <div style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${title}</div>
                                <div style="font-size:11px;color:#888;">${time}</div>
                            </div>
                        `;
                    }).join('');
                } else {
                    listDiv.innerHTML = '<div style="font-size:12px;color:#888;padding:8px;">暂无记录</div>';
                }
            } catch (error) {
                console.error('Load history error:', error);
                listDiv.innerHTML = '<div style="font-size:12px;color:#f00;padding:8px;">加载失败</div>';
            }
        }

        // 加载指定会话
        async function loadChatSession(sessionId) {
            const tenantId = document.getElementById('kb-tenant-input')?.value || document.getElementById('upload-tenant-id')?.value || 'test_tenant';
            const messagesDiv = document.getElementById('chat-messages');

            // 设置当前session ID
            currentSessionId = sessionId;

            try {
                // 获取会话消息
                const response = await fetch(`${API_BASE}/chat/${sessionId}/messages/`);
                const messages = await response.json();

                if (messages.length > 0) {
                    messagesDiv.innerHTML = messages.map(msg => {
                        const isUser = msg.role === 'user';

                        // 格式化来源（仅assistant消息）
                        let sourcesHtml = '';
                        if (!isUser && msg.sources && msg.sources.length > 0) {
                            sourcesHtml = '<div class="sources"><strong>参考资料:</strong><br>';
                            msg.sources.forEach((s, i) => {
                                let fileName = s.metadata?.original_filename || s.metadata?.file_name || '未知文件';
                                const docId = s.metadata?.doc_id || '';
                                const pageLabel = s.metadata?.page_label || '';
                                const content = s.content_preview?.substring(0, 150) || '';
                                const score = (s.score * 100).toFixed(1);
                                const downloadBtn = docId ? `<button onclick="downloadDocument('${docId}', '${fileName}')" style="margin-left: 8px; padding: 2px 8px; font-size: 11px; background: #4b5563; color: white; border: none; border-radius: 3px; cursor: pointer;">下载</button>` : '';
                                sourcesHtml += `
                                    <div class="source-item">
                                        <div class="source-file">📄 ${fileName}${pageLabel ? ' (第' + pageLabel + '页)' : ''} ${downloadBtn}</div>
                                        <div class="source-content">${content}...</div>
                                        <div class="source-score">相关性: ${score}%</div>
                                    </div>
                                `;
                            });
                            sourcesHtml += '</div>';
                        }

                        return `
                            <div class="message ${isUser ? 'user' : 'assistant'}">
                                <div class="message-avatar">${isUser ? '你' : 'AI'}</div>
                                <div class="message-content">
                                    <div class="message-role">${isUser ? '你' : 'AI 助手'}</div>
                                    <div class="message-bubble">${msg.content}</div>
                                    ${sourcesHtml}
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    messagesDiv.innerHTML = `
                        <div class="message assistant">
                            <div class="message-avatar">AI</div>
                            <div class="message-content">
                                <div class="message-role">AI 助手</div>
                                <div class="message-bubble">你好！我是 AI 助手。</div>
                            </div>
                        </div>
                    `;
                }

                showChat();
            } catch (error) {
                console.error('Load session error:', error);
            }
        }

        // 发送消息
        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const tenantId = selectedTenant ? selectedTenant.id :
                document.getElementById('upload-tenant-id')?.value ||
                'test_tenant';
            const question = document.getElementById('question-input').value.trim();

            if (!tenantId) {
                alert('请先选择租户');
                return;
            }
            if (!question) return;

            const messagesDiv = document.getElementById('chat-messages');
            const sendBtn = document.getElementById('send-btn');

            // 添加用户消息
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerHTML = `
                <div class="message-avatar">你</div>
                <div class="message-content">
                    <div class="message-role">你</div>
                    <div class="message-bubble">${question}</div>
                </div>
            `;
            messagesDiv.appendChild(userMsg);

            // 添加加载中
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'message assistant';
            loadingMsg.id = 'loading';
            loadingMsg.innerHTML = `
                <div class="message-avatar">AI</div>
                <div class="message-content">
                    <div class="message-role">AI 助手</div>
                    <div class="message-bubble">思考中...</div>
                </div>
            `;
            messagesDiv.appendChild(loadingMsg);

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            sendBtn.disabled = true;
            document.getElementById('question-input').value = '';

            try {
                // 如果有当前session，使用它；否则创建新session
                const requestBody = {
                    tenant_id: tenantId,
                    query: question
                };
                if (currentSessionId) {
                    requestBody.session_id = currentSessionId;
                }

                const response = await fetch(`${API_BASE}/chat/ask/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();
                document.getElementById('loading').remove();

                if (response.ok) {
                    // 设置当前session ID
                    if (data.session_id) {
                        currentSessionId = data.session_id;
                    }

                    const assistantMsg = document.createElement('div');
                    assistantMsg.className = 'message assistant';

                    // 格式化来源
                    let sourcesHtml = '';
                    if (data.sources && data.sources.length > 0) {
                        sourcesHtml = '<div class="sources"><strong>参考资料:</strong><br>';
                        data.sources.forEach((s, i) => {
                            // 优先使用 original_filename，否则使用 file_name
                            let fileName = s.metadata?.original_filename || s.metadata?.file_name || '未知文件';
                            const docId = s.metadata?.doc_id || '';

                            const pageLabel = s.metadata?.page_label || '';
                            const content = s.content_preview?.substring(0, 150) || '';
                            const score = (s.score * 100).toFixed(1);
                            const downloadBtn = docId ? `<button onclick="downloadDocument('${docId}', '${fileName}')" style="margin-left: 8px; padding: 2px 8px; font-size: 11px; background: #4b5563; color: white; border: none; border-radius: 3px; cursor: pointer;">下载</button>` : '';
                            sourcesHtml += `
                                <div class="source-item">
                                    <div class="source-file">📄 ${fileName}${pageLabel ? ' (第' + pageLabel + '页)' : ''} ${downloadBtn}</div>
                                    <div class="source-content">${content}...</div>
                                    <div class="source-score">相关性: ${score}%</div>
                                </div>
                            `;
                        });
                        sourcesHtml += '</div>';
                    }

                    assistantMsg.innerHTML = `
                        <div class="message-avatar">AI</div>
                        <div class="message-content">
                            <div class="message-role">AI 助手</div>
                            <div class="message-bubble">${data.answer}</div>
                            ${sourcesHtml}
                        </div>
                    `;
                    messagesDiv.appendChild(assistantMsg);
                } else {
                    alert('回答失败: ' + JSON.stringify(data));
                }
            } catch (error) {
                document.getElementById('loading').remove();
                alert('回答失败: ' + error.message);
            } finally {
                sendBtn.disabled = false;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }

        // 上传文档
        async function showUploadModal() {
            // Load tenants into upload dropdown
            const select = document.getElementById('upload-tenant-id');
            try {
                const response = await fetch(`${API_BASE}/tenants/`);
                const tenants = await response.json();
                select.innerHTML = '<option value="">选择租户</option>';
                tenants.forEach(tenant => {
                    const option = document.createElement('option');
                    option.value = tenant.tenant_id;
                    option.textContent = `${tenant.name} (${tenant.tenant_id})`;
                    select.appendChild(option);
                });
                // Pre-select first tenant if available
                if (tenants.length > 0) {
                    select.value = tenants[0].tenant_id;
                }
            } catch (error) {
                console.error('Failed to load tenants:', error);
            }
            document.getElementById('upload-modal').classList.add('show');
        }

        function hideUploadModal() {
            document.getElementById('upload-modal').classList.remove('show');
        }

        async function uploadDocument() {
            const tenantId = document.getElementById('upload-tenant-id').value;
            const fileInput = document.getElementById('upload-file');

            if (!tenantId || !fileInput.files.length) {
                alert('请选择租户并选择文件');
                return;
            }

            // 使用 FormData 批量上传
            const formData = new FormData();
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append('files', fileInput.files[i]);
            }
            formData.append('tenant_id', tenantId);

            try {
                const response = await fetch(`${API_BASE}/documents/`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.uploaded && data.uploaded.length > 1) {
                        alert(`上传成功！共上传 ${data.uploaded.length} 个文件`);
                    } else {
                        alert('上传成功！');
                    }
                    hideUploadModal();
                    // 清空文件选择
                    fileInput.value = '';
                    loadDocuments();
                } else {
                    const data = await response.json();
                    alert('上传失败: ' + JSON.stringify(data));
                }
            } catch (error) {
                alert('上传失败: ' + error.message);
            }
        }

        // 获取文件图标
        function getFileIcon(filename) {
            if (!filename) return '📄';
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'pdf': '📕',
                'doc': '📘',
                'docx': '📘',
                'txt': '📝',
                'md': '📝',
                'xls': '📗',
                'xlsx': '📗',
                'ppt': '📙',
                'pptx': '📙',
                'jpg': '🖼️',
                'jpeg': '🖼️',
                'png': '🖼️',
                'gif': '🖼️'
            };
            return icons[ext] || '📄';
        }

        // 获取状态文本
        function getStatusText(status) {
            const statusMap = {
                'COMPLETED': '已完成',
                'completed': '已完成',
                'PROCESSING': '处理中',
                'processing': '处理中',
                'FAILED': '失败',
                'failed': '失败',
                'PENDING': '等待中',
                'pending': '等待中'
            };
            return statusMap[status] || status;
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));

            if (days === 0) return '今天';
            if (days === 1) return '昨天';
            if (days < 7) return `${days}天前`;
            return date.toLocaleDateString('zh-CN');
        }

        // 搜索/筛选文档
        function filterDocuments() {
            currentDocPage = 1;
            loadDocuments();
        }

        // 全选/取消全选
        function toggleSelectAll() {
            const selectAll = document.getElementById('doc-select-all');
            const checkboxes = document.querySelectorAll('.doc-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = selectAll.checked;
            });
            updateSelectedCount();
        }

        // 更新已选数量
        function updateSelectedCount() {
            const checkboxes = document.querySelectorAll('.doc-checkbox:checked');
            const countEl = document.getElementById('selected-count');
            if (countEl) {
                countEl.textContent = checkboxes.length;
            }
        }

        // 批量删除文档
        async function batchDeleteDocuments() {
            const checkboxes = document.querySelectorAll('.doc-checkbox:checked');
            const docIds = Array.from(checkboxes).map(cb => cb.value);

            if (docIds.length === 0) {
                alert('请选择要删除的文档');
                return;
            }

            if (!confirm(`确定要删除选中的 ${docIds.length} 个文档吗？`)) return;

            try {
                let deletedCount = 0;
                for (const docId of docIds) {
                    const response = await fetch(`${API_BASE}/documents/${docId}/`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        deletedCount++;
                    }
                }
                alert(`成功删除 ${deletedCount} 个文档`);
                loadDocuments();
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }

        // 监听复选框变化
        document.addEventListener('change', function(e) {
            if (e.target.classList.contains('doc-checkbox')) {
                updateSelectedCount();
            }
        });

        // 加载文档列表
        async function loadDocuments() {
            const tenantId = window.selectedTenantKb ? window.selectedTenantKb.id : '';
            const searchKeyword = document.getElementById('doc-search-input')?.value || '';
            const statusFilter = document.getElementById('doc-status-filter')?.value || '';
            const listDiv = document.getElementById('doc-list');

            listDiv.innerHTML = '<div style="text-align: center; color: #888; padding: 40px;">加载中...</div>';

            try {
                // 构建查询参数
                let url = `${API_BASE}/documents/?tenant_id=${tenantId}&page=${currentDocPage}&page_size=${docPageSize}`;
                if (searchKeyword) {
                    url += `&search=${encodeURIComponent(searchKeyword)}`;
                }
                if (statusFilter) {
                    url += `&status=${statusFilter}`;
                }

                const response = await fetch(url);
                const data = await response.json();

                const docs = data.results || [];
                docTotal = data.total || 0;

                if (docs.length > 0) {
                    listDiv.innerHTML = `
                        <div class="doc-item doc-item-header" style="background: #f9fafb; font-weight: 500; color: #6b7280; font-size: 13px;">
                            <input type="checkbox" id="doc-select-all" style="margin-right: 12px;" onclick="toggleSelectAll()">
                            <span style="flex: 1;">文件名</span>
                            <span style="width: 100px; text-align: center;">状态</span>
                            <span style="width: 100px; text-align: center;">时间</span>
                            <span style="width: 100px; text-align: center;">操作</span>
                        </div>
                    ` + docs.map(doc => `
                        <div class="doc-item">
                            <input type="checkbox" class="doc-checkbox" value="${doc.id}" style="margin-right: 12px;">
                            <span class="doc-icon" style="font-size: 20px; margin-right: 12px;">${getFileIcon(doc.filename)}</span>
                            <div class="doc-info" style="flex: 1; min-width: 0;">
                                <div class="doc-name" style="font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${doc.filename}</div>
                            </div>
                            <span class="doc-status ${doc.status.toLowerCase()}" style="width: 100px; text-align: center;">${getStatusText(doc.status)}</span>
                            <span class="doc-date" style="color: #888; font-size: 12px; width: 100px; text-align: center;">${formatDate(doc.created_at)}</span>
                            <button class="download-btn" style="padding: 6px 12px; font-size: 12px; width: 60px; text-align: center; margin-right: 8px; background: #4b5563; color: white; border: none; border-radius: 4px; cursor: pointer;" onclick="downloadDocument('${doc.id}', '${doc.filename}')">下载</button>
                            <button class="delete-btn" style="padding: 6px 12px; font-size: 12px; width: 60px; text-align: center;" onclick="deleteDocument('${doc.id}')">删除</button>
                        </div>
                    `).join('');

                    // 添加批量删除按钮
                    if (docs.length > 0) {
                        listDiv.innerHTML += `
                            <div class="doc-item" style="justify-content: space-between; background: #f9fafb;">
                                <span style="color: #6b7280; font-size: 13px;">已选 <span id="selected-count">0</span> 项</span>
                                <button onclick="batchDeleteDocuments()" style="padding: 6px 16px; background: #dc2626; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px;">批量删除</button>
                            </div>
                        `;
                    }
                } else {
                    listDiv.innerHTML = '<div style="text-align: center; color: #888; padding: 40px;">暂无文档，请上传</div>';
                }

                // Update pagination
                updatePagination();
            } catch (error) {
                listDiv.innerHTML = '<div style="text-align: center; color: #888; padding: 40px;">加载失败: ' + error.message + '</div>';
            }
        }

        // 更新分页控件
        function updatePagination() {
            const pagination = document.getElementById('doc-pagination');
            const pageInfo = document.getElementById('page-info');
            const prevBtn = document.getElementById('prev-page-btn');
            const nextBtn = document.getElementById('next-page-btn');

            if (docTotal <= docPageSize) {
                pagination.style.display = 'none';
                return;
            }

            pagination.style.display = 'flex';
            const totalPages = Math.ceil(docTotal / docPageSize);
            pageInfo.textContent = `${currentDocPage} / ${totalPages}`;
            prevBtn.disabled = currentDocPage <= 1;
            nextBtn.disabled = currentDocPage >= totalPages;
        }

        // 切换分页
        function changePage(delta) {
            const totalPages = Math.ceil(docTotal / docPageSize);
            const newPage = currentDocPage + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                currentDocPage = newPage;
                loadDocuments();
            }
        }

        // 下载文档 - 使用 blob 方式避免文件名编码问题
        async function downloadDocument(docId, filename) {
            try {
                const response = await fetch(`${API_BASE}/documents/${docId}/download/`);
                if (!response.ok) {
                    alert('下载失败');
                    return;
                }
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                alert('下载失败: ' + error.message);
            }
        }

        // 删除文档
        async function deleteDocument(docId) {
            if (!confirm('确定要删除这个文档吗？')) return;

            try {
                const response = await fetch(`${API_BASE}/documents/${docId}/`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('删除成功');
                    loadDocuments();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }

        // ==================== 租户管理 ====================
        function showTenantManagement() {
            // 隐藏其他页面，显示租户管理页面
            document.getElementById('chat-page').classList.add('hidden');
            document.getElementById('kb-page').classList.add('hidden');
            document.getElementById('tenant-page').classList.remove('hidden');

            // 隐藏历史记录
            document.getElementById('history-section').classList.add('hidden');

            // 更新菜单选中状态
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            document.getElementById('tenant-menu').classList.add('active');

            loadTenants();
        }

        async function loadTenants() {
            const listDiv = document.getElementById('tenant-list');
            listDiv.innerHTML = '<div style="text-align: center; color: #888; padding: 40px;">加载中...</div>';

            try {
                const response = await fetch(`${API_BASE}/tenants/`);
                const tenants = await response.json();

                if (tenants.length > 0) {
                    listDiv.innerHTML = tenants.map(tenant => `
                        <div class="doc-item">
                            <div class="doc-info">
                                <span class="doc-icon">🏢</span>
                                <div>
                                    <div class="doc-name">${tenant.name}</div>
                                    <div class="doc-date">ID: ${tenant.tenant_id}</div>
                                    <div class="doc-date">创建时间: ${new Date(tenant.created_at).toLocaleString()}</div>
                                </div>
                            </div>
                            <button class="delete-btn" onclick="deleteTenant('${tenant.id}')">删除</button>
                        </div>
                    `).join('');
                } else {
                    listDiv.innerHTML = '<div style="text-align: center; color: #888; padding: 40px;">暂无租户，请添加</div>';
                }
            } catch (error) {
                listDiv.innerHTML = '<div style="text-align: center; color: #888; padding: 40px;">加载失败: ' + error.message + '</div>';
            }
        }

        function showAddTenantModal() {
            document.getElementById('add-tenant-modal').classList.add('show');
        }

        function hideAddTenantModal() {
            document.getElementById('add-tenant-modal').classList.remove('show');
        }

        async function addTenant() {
            const name = document.getElementById('tenant-name').value;
            const tenantId = document.getElementById('tenant-id').value;
            const description = document.getElementById('tenant-description').value;

            if (!name || !tenantId) {
                alert('请填写租户名称和租户ID');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/tenants/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: name,
                        tenant_id: tenantId,
                        description: description
                    })
                });

                if (response.ok) {
                    alert('添加成功！');
                    hideAddTenantModal();
                    loadTenants();
                } else {
                    const data = await response.json();
                    alert('添加失败: ' + JSON.stringify(data));
                }
            } catch (error) {
                alert('添加失败: ' + error.message);
            }
        }

        async function deleteTenant(tenantId) {
            if (!confirm('确定要删除这个租户吗？')) return;

            try {
                const response = await fetch(`${API_BASE}/tenants/${tenantId}/`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('删除成功');
                    loadTenants();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function () {
            showChat();
            // loadHistory 会在 loadChatTenantSelect 内部调用
        });
    </script>
</body>

</html>
